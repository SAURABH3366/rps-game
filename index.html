<!DOCTYPE html>
<html>

<head>
<title>Rock Paper Scissors</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

h1{
margin-bottom:20px;
}

button{
padding:12px 25px;
margin:10px;
font-size:18px;
border:none;
border-radius:8px;
background:#667eea;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.2);
background:#4b5bdc;
}

#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}

.choice{
font-size:50px;
margin:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>Rock Paper Scissors</h1>

<div class="choice">🪨 📄 ✂️</div>

<button onclick="play('rock')">Rock</button>
<button onclick="play('paper')">Paper</button>
<button onclick="play('scissors')">Scissors</button>

<h2 id="result"></h2>

</div>

<script>

function play(user){

const choices=["rock","paper","scissors"]

const computer=choices[Math.floor(Math.random()*3)]

let result=""

if(user===computer){
result="Draw 🤝"
}
else if(
(user==="rock" && computer==="scissors") ||
(user==="paper" && computer==="rock") ||
(user==="scissors" && computer==="paper")
){
result="You Win 🎉"
}
else{
result="Computer Wins 🤖"
}

document.getElementById("result").innerHTML=
"Computer chose "+computer+"<br>"+result

}

</script>

</body>

</html>
