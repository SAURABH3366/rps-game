<!DOCTYPE html>
<html>

<head>
<title>Avengers Rock Paper Scissors</title>

<style>

body{
font-family: Arial;
background: url("https://media.giphy.com/media/3o7abB06u9bNzA8lu8/giphy.gif");
background-size:cover;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
background:rgba(0,0,0,0.7);
padding:40px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

h1{
margin-bottom:20px;
font-size:32px;
}

button{
padding:12px 25px;
margin:10px;
font-size:18px;
border:none;
border-radius:8px;
background:#e62429;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.2);
background:#ff3b3f;
}

#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}

.choice{
font-size:60px;
margin:10px;
animation:spin 3s infinite linear;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

<div class="container">

<h1>🦸 Avengers Rock Paper Scissors</h1>

<div class="choice">🪨 📄 ✂️</div>

<button onclick="play('rock')">🪨 Rock</button>
<button onclick="play('paper')">📄 Paper</button>
<button onclick="play('scissors')">✂️ Scissors</button>

<h2 id="result"></h2>

</div>

<script>

function play(user){

const choices=["rock","paper","scissors"]

const computer=choices[Math.floor(Math.random()*3)]

let result=""

if(user===computer){
result="Draw 🤝"
}
else if(
(user==="rock" && computer==="scissors") ||
(user==="paper" && computer==="rock") ||
(user==="scissors" && computer==="paper")
){
result="You Win 🦸"
}
else{
result="Computer Wins 🤖"
}

document.getElementById("result").innerHTML=
"Computer chose "+computer+"<br>"+result

}

</script>

</body>

</html>
